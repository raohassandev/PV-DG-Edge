openapi: 3.0.3
info:
  title: PV-DG Edge Local API
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /system/health:
    get:
      summary: Get local platform health
      tags: [System]
      responses:
        '200':
          description: API responded with dependency health. Overall status may be ok or degraded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
components:
  schemas:
    ServiceStatus:
      type: string
      enum: [ok, degraded, down, not_configured]
    ServiceHealth:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/ServiceStatus'
        latencyMs:
          type: integer
          nullable: true
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
    HealthResponse:
      type: object
      required: [success, data, meta]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [status, timestamp, uptimeSeconds, version, environment, services]
          properties:
            status:
              type: string
              enum: [ok, degraded, down]
            timestamp:
              type: string
              format: date-time
            uptimeSeconds:
              type: integer
              minimum: 0
            version:
              type: string
            environment:
              type: string
              enum: [development, test, production]
            services:
              type: object
              required: [api, database, redis, mqtt]
              properties:
                api:
                  $ref: '#/components/schemas/ServiceHealth'
                database:
                  $ref: '#/components/schemas/ServiceHealth'
                redis:
                  $ref: '#/components/schemas/ServiceHealth'
                mqtt:
                  $ref: '#/components/schemas/ServiceHealth'
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string
