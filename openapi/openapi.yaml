openapi: 3.0.3
info:
  title: PV-DG Edge Local API
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /system/health:
    get:
      summary: Get API service health
      tags: [System]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /auth/login:
    post:
      summary: Login user
      tags: [Auth]
      responses:
        '200': { description: OK }
  /auth/me:
    get:
      summary: Current user
      tags: [Auth]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
  /sites:
    get:
      summary: List sites
      tags: [Sites]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
    post:
      summary: Create site
      tags: [Sites]
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Created }
  /devices:
    get:
      summary: List devices
      tags: [Devices]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
    post:
      summary: Create device
      tags: [Devices]
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Created }
  /telemetry/live/site/{siteId}:
    get:
      summary: Get live site snapshot
      tags: [Telemetry]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: siteId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: OK }
  /telemetry/history:
    get:
      summary: Query historical telemetry
      tags: [Telemetry]
      security: [{ bearerAuth: [] }]
      parameters:
        - name: siteId
          in: query
          required: true
          schema: { type: string, format: uuid }
        - name: metric
          in: query
          required: true
          schema: { type: string }
        - name: from
          in: query
          required: true
          schema: { type: string, format: date-time }
        - name: to
          in: query
          required: true
          schema: { type: string, format: date-time }
      responses:
        '200': { description: OK }
  /alarms:
    get:
      summary: List alarms
      tags: [Alarms]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: OK }
  /commands:
    post:
      summary: Request command
      tags: [Commands]
      security: [{ bearerAuth: [] }]
      responses:
        '202': { description: Accepted }
components:
  schemas:
    HealthResponse:
      type: object
      required: [success, data, meta]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: object
          required: [service, status, timestamp, dependencies]
          properties:
            service:
              type: string
              enum: [api]
            status:
              type: string
              enum: [ok]
            timestamp:
              type: string
              format: date-time
            dependencies:
              type: object
              properties:
                database:
                  type: object
                  properties:
                    configured:
                      type: boolean
                    status:
                      type: string
                      enum: [not_connected]
        meta:
          type: object
          required: [requestId]
          properties:
            requestId:
              type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
