version: "3.9"

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - redis
      - mosquitto

  acquisition-worker:
    build:
      context: .
      dockerfile: apps/acquisition-worker/Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - redis
      - mosquitto

  aggregation-worker:
    build:
      context: .
      dockerfile: apps/aggregation-worker/Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - redis
      - mosquitto

  rules-worker:
    build:
      context: .
      dockerfile: apps/rules-worker/Dockerfile
    env_file: .env
    depends_on:
      - postgres
      - redis
      - mosquitto

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: pvdg_edge
      POSTGRES_USER: pvdg
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

volumes:
  postgres-data:
  redis-data:
  mosquitto-data:
  mosquitto-log:
